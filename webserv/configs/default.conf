server {
    listen 8080 8081;
    listen 8082;
	server_name server42.com;
    root www;
    index index.html;
    error_page 404 www/404.html;
    error_page 500 502 503 504 www/50x.html;
    client_max_body_size 1000000000;
    method GET POST;

    location / {
        try_files $uri $uri/ =404;
    }

    location /download/ {
        return 301 /files/;
    }

	location /files/ {
        autoindex on;
	}

	location /nolist/ {
        autoindex off;
	}

    location /upload {
        root www/uploads;
		upload_path www/uploads;
        method POST;
		autoindex on;
        client_max_body_size 5000000;
    }

    location /delete {
        root www/uploads;
        method DELETE;
    }

    location /cgi-bin/ {
		root www/cgi-bin;
        cgi_enabled on;
        cgi .sh /bin/bash;
		cgi .py /bin/python3;
    }
}

server {
	listen 8083;
	server_name pythonserver;
	root www/webpython;
	index index.py;
	client_max_body_size 500000;
	method GET;
	location / {
		root www/webpython;
		cgi_enabled on;
		cgi .py /bin/python3;
		try_files $uri $uri/ =404;
	}
}
