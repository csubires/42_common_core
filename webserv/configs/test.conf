# Another test file with multiple server blocks
server {
    listen 8080;
    server_name firstserver;
    root /var/www/first;
    index index.html;
    error_page 404 /404.html;
    client_max_body_size 500000000;
    method GET POST;
    location / {
        try_files $uri $uri/ =404;
    }
    location /downloads/ {
        autoindex on;
    }
}
server {
    listen 8081;
    server_name secondserver;
    root /var/www/second;
    index index.html;
    error_page 500 502 503 504 /50x.html;
    client_max_body_size 200000000;
    method GET POST DELETE;
    location / {
        try_files $uri $uri/ =404;
    }
    location /scripts/ {
        cgi_enabled on;
        cgi .pl /usr/bin/perl;
        include /etc/nginx/fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.cgi;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
server {
    listen 8082;
    server_name thirdserver;
    root /var/www/third;
    index index.html;
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    client_max_body_size 300000000;
    method GET;
    location / {
        try_files $uri $uri/ =404;
    }
    location /media/ {
        autoindex on;
    }
}